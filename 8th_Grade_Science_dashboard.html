<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8th Grade Science Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1625;
    --ink2: #2d2540;
    --plum: #6d28d9;
    --plum-lt: #ede9fe;
    --amber: #d97706;
    --amber-lt: #fef3c7;
    --rose: #be123c;
    --rose-lt: #ffe4e6;
    --teal: #0f766e;
    --teal-lt: #ccfbf1;
    --sky: #0284c7;
    --sky-lt: #e0f2fe;
    --green: #15803d;
    --green-lt: #dcfce7;
    --slate: #64748b;
    --paper: #faf9f7;
    --white: #ffffff;
    --card-shadow: 0 2px 16px rgba(26,22,37,0.10);
    --t1: #15803d; --t2: #d97706; --t3: #be123c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Source Sans 3',sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; }

  /* HEADER */
  header { background:var(--ink); color:#fff; position:sticky; top:0; z-index:100; box-shadow:0 3px 20px rgba(0,0,0,.4); }
  .header-inner { display:flex; align-items:center; justify-content:space-between; padding:12px 32px; gap:20px; flex-wrap:wrap; }
  .htitle h1 { font-family:'Playfair Display',serif; font-size:1.4rem; letter-spacing:.2px; }
  .htitle span { font-size:.72rem; color:#a78bfa; font-weight:600; letter-spacing:.9px; text-transform:uppercase; display:block; margin-top:2px; }
  .cdown { display:flex; align-items:center; gap:14px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:10px 18px; }
  .cdown-lbl { font-size:.68rem; text-transform:uppercase; letter-spacing:1px; color:#a78bfa; font-weight:700; }
  .cdown-num { font-family:'Playfair Display',serif; font-size:2.2rem; line-height:1; color:#fbbf24; }
  .cdown-sub { font-size:.62rem; color:#94a3b8; margin-top:1px; }
  .cdown-date { font-size:.73rem; color:#fde68a; font-weight:600; }
  .tab-nav { display:flex; background:var(--ink2); padding:0 32px; border-bottom:2px solid rgba(255,255,255,.06); overflow-x:auto; }
  .tab-btn { background:none; border:none; color:#94a3b8; padding:10px 20px; font-family:'Source Sans 3',sans-serif; font-size:.8rem; font-weight:700; cursor:pointer; border-bottom:3px solid transparent; transition:all .2s; white-space:nowrap; letter-spacing:.5px; text-transform:uppercase; }
  .tab-btn:hover { color:#fff; }
  .tab-btn.active { color:#c4b5fd; border-bottom-color:#7c3aed; }

  /* COURSE TABS - secondary nav for switching between Bio and M/J Sci */
  .course-bar { display:flex; gap:0; background:#fff; border-bottom:1px solid #e2e8f0; padding:0 32px; }
  .course-btn { background:none; border:none; padding:11px 22px; font-family:'Source Sans 3',sans-serif; font-size:.78rem; font-weight:700; cursor:pointer; color:var(--slate); border-bottom:3px solid transparent; transition:all .2s; letter-spacing:.4px; text-transform:uppercase; }
  .course-btn:hover { color:var(--ink); }
  .course-btn.bio.active { color:var(--teal); border-bottom-color:var(--teal); background:var(--teal-lt); }
  .course-btn.mj.active { color:var(--sky); border-bottom-color:var(--sky); background:var(--sky-lt); }

  /* MAIN */
  main { padding:26px 32px; max-width:1600px; margin:0 auto; }
  .tab-pane { display:none; animation:fadeUp .3s ease; }
  .tab-pane.active { display:block; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .sec-title { font-family:'Playfair Display',serif; font-size:1.45rem; margin-bottom:5px; }
  .sec-sub { font-size:.82rem; color:var(--slate); margin-bottom:22px; }

  /* STAT CARDS */
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:26px; }
  .stat-card { background:#fff; border-radius:12px; padding:16px 18px; box-shadow:var(--card-shadow); border-top:4px solid var(--acc,#7c3aed); }
  .stat-lbl { font-size:.68rem; text-transform:uppercase; letter-spacing:.8px; color:var(--slate); font-weight:700; margin-bottom:7px; }
  .stat-val { font-family:'Playfair Display',serif; font-size:1.9rem; line-height:1; color:var(--acc,#7c3aed); margin-bottom:3px; }
  .stat-det { font-size:.72rem; color:var(--slate); }

  /* LAYOUTS */
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px; }
  .three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; margin-bottom:18px; }
  @media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr}}

  /* CARD */
  .card { background:#fff; border-radius:14px; padding:20px 22px; box-shadow:var(--card-shadow); }
  .card-title { font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:14px; display:flex; align-items:center; gap:9px; }
  .cicon { width:26px; height:26px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:.8rem; flex-shrink:0; }

  /* BARS */
  .pbar-wrap { margin-bottom:9px; }
  .pbar-top { font-size:.73rem; font-weight:700; display:flex; justify-content:space-between; margin-bottom:3px; }
  .pbar-bg { background:#e2e8f0; border-radius:5px; height:9px; overflow:hidden; }
  .pbar-fill { height:100%; border-radius:5px; transition:width .8s ease; }
  .dbar-wrap { display:flex; flex-direction:column; gap:11px; }
  .dbar-name { font-size:.72rem; font-weight:700; color:var(--slate); margin-bottom:3px; display:flex; justify-content:space-between; }
  .dbar-bg { background:#e2e8f0; border-radius:5px; height:20px; position:relative; overflow:hidden; }
  .dbar-fill { height:100%; border-radius:5px; display:flex; align-items:center; justify-content:flex-end; padding-right:7px; font-size:.63rem; color:#fff; font-weight:800; transition:width .8s ease; }
  .dbar-bench { position:absolute; top:0; bottom:0; width:2px; background:var(--rose); }

  /* Stacked benchmark bars (B1 vs B3) */
  .stk-row { margin-bottom:13px; }
  .stk-name { font-size:.74rem; font-weight:700; color:var(--ink); margin-bottom:4px; }
  .stk-bars { display:flex; flex-direction:column; gap:3px; }
  .stk-line { display:flex; align-items:center; gap:8px; }
  .stk-tag { font-size:.6rem; font-weight:800; color:var(--slate); width:18px; text-align:right; flex-shrink:0; letter-spacing:.5px; }
  .stk-bg { flex:1; background:#e2e8f0; border-radius:4px; height:14px; overflow:hidden; position:relative; }
  .stk-fill { height:100%; border-radius:4px; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; font-size:.6rem; color:#fff; font-weight:800; }

  /* STANDARDS TABLE */
  .stbl { width:100%; border-collapse:collapse; font-size:.76rem; }
  .stbl th { background:var(--ink); color:#fff; padding:8px 11px; text-align:left; font-size:.68rem; font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
  .stbl td { padding:7px 11px; border-bottom:1px solid #f1f5f9; vertical-align:top; }
  .stbl tr:hover td { background:#fafaf9; }
  .scode { font-family:monospace; font-size:.68rem; background:#e0f2fe; color:#0369a1; padding:2px 6px; border-radius:4px; white-space:nowrap; font-weight:700; }
  .scode-bio { background:#ccfbf1; color:#0f766e; }
  .gpill { display:inline-block; padding:2px 7px; border-radius:20px; font-size:.63rem; font-weight:800; }
  .ghi { background:#ffe4e6; color:#9f1239; }
  .gmd { background:#fef3c7; color:#92400e; }
  .glo { background:#bbf7d0; color:#14532d; }

  /* STUDENT TABLE */
  .stbl-wrap { overflow-x:auto; }
  .stbl2 { width:100%; border-collapse:collapse; font-size:.75rem; }
  .stbl2 th { background:var(--ink); color:#fff; padding:8px 10px; text-align:left; font-size:.67rem; text-transform:uppercase; font-weight:700; letter-spacing:.4px; white-space:nowrap; cursor:pointer; }
  .stbl2 th:hover { background:#2d2540; }
  .stbl2 td { padding:7px 10px; border-bottom:1px solid #f1f5f9; white-space:nowrap; }
  .stbl2 tr:hover td { background:#f8f9fa; }
  .stbl2 tr.clk { cursor:pointer; }

  /* Performance pills */
  .ptag { display:inline-block; padding:2px 8px; border-radius:20px; font-size:.64rem; font-weight:800; }
  .p-mas { background:#bbf7d0; color:#14532d; }
  .p-prof { background:#d1fae5; color:#065f46; }
  .p-app { background:#fef9c3; color:#713f12; }
  .p-bel { background:#fed7aa; color:#7c2d12; }
  .p-far { background:#fecaca; color:#7f1d1d; }
  .p-na { background:#f1f5f9; color:#64748b; }

  /* Diff arrows */
  .diff-up { color:var(--green); font-weight:800; }
  .diff-dn { color:var(--rose); font-weight:800; }
  .diff-flat { color:var(--slate); font-weight:700; }

  /* CLASS TABS */
  .hr-tabs { display:flex; gap:0; border-bottom:2px solid #e2e8f0; margin-bottom:20px; flex-wrap:wrap; }
  .hr-tab { padding:8px 18px; background:none; border:none; font-family:'Source Sans 3',sans-serif; font-size:.78rem; font-weight:700; cursor:pointer; color:var(--slate); border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .2s; }
  .hr-tab.active { color:var(--plum); border-bottom-color:var(--plum); }
  .hr-tab:hover { color:var(--ink); }

  /* Search bar */
  .srch-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
  .srch-bar input, .srch-bar select { padding:8px 12px; border:1.5px solid #e2e8f0; border-radius:7px; font-size:.83rem; font-family:'Source Sans 3',sans-serif; background:#fff; color:var(--ink); }
  .srch-bar input:focus, .srch-bar select:focus { outline:none; border-color:var(--plum); }
  .srch-bar input { flex:1; min-width:240px; }

  /* Individual student detail */
  .ind-detail { background:#fff; border-radius:14px; padding:20px 22px; box-shadow:var(--card-shadow); margin-bottom:18px; display:none; }
  .ind-detail.show { display:block; }
  .ind-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; padding-bottom:14px; border-bottom:1.5px solid #f1f5f9; flex-wrap:wrap; gap:12px; }
  .ind-name { font-family:'Playfair Display',serif; font-size:1.4rem; }
  .ind-meta { font-size:.72rem; color:var(--slate); margin-top:3px; letter-spacing:.3px; }
  .ind-scores { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; margin-bottom:16px; }
  .ind-score { background:#faf9f7; border-radius:8px; padding:10px 12px; border-left:3px solid var(--plum); }
  .ind-score-lbl { font-size:.62rem; text-transform:uppercase; letter-spacing:.6px; color:var(--slate); font-weight:700; margin-bottom:3px; }
  .ind-score-val { font-family:'Playfair Display',serif; font-size:1.4rem; line-height:1; }

  /* Tier cards */
  .tier-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; margin-bottom:22px; }
  @media(max-width:1100px){.tier-grid{grid-template-columns:1fr}}
  .tier-card { background:#fff; border-radius:14px; padding:18px 20px; box-shadow:var(--card-shadow); border-top:5px solid var(--tier-c); }
  .tier-card.t1 { --tier-c:var(--t1); }
  .tier-card.t2 { --tier-c:var(--t2); }
  .tier-card.t3 { --tier-c:var(--t3); }
  .tier-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
  .tier-lbl { font-family:'Playfair Display',serif; font-size:1.05rem; color:var(--tier-c); }
  .tier-sub { font-size:.7rem; color:var(--slate); font-weight:600; margin-top:2px; }
  .tier-count { font-family:'Playfair Display',serif; font-size:2rem; line-height:1; color:var(--tier-c); }
  .tier-desc { font-size:.74rem; color:var(--slate); margin-bottom:13px; line-height:1.4; }
  .tier-list { max-height:280px; overflow-y:auto; padding-right:5px; }
  .tier-stu { padding:6px 9px; background:#faf9f7; border-radius:6px; margin-bottom:5px; font-size:.74rem; display:flex; justify-content:space-between; align-items:center; gap:8px; border-left:3px solid var(--tier-c); }
  .tier-stu-name { font-weight:600; }
  .tier-stu-sc { font-size:.7rem; color:var(--slate); font-weight:700; font-family:monospace; }

  /* Action plan */
  .week-card { background:#fff; border-radius:14px; padding:20px 24px; box-shadow:var(--card-shadow); margin-bottom:18px; border-left:6px solid var(--wc,#7c3aed); position:relative; }
  .week-num { position:absolute; top:-10px; right:24px; background:var(--wc); color:#fff; padding:4px 14px; border-radius:20px; font-size:.65rem; font-weight:800; letter-spacing:.8px; text-transform:uppercase; }
  .week-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; flex-wrap:wrap; gap:8px; }
  .week-title { font-family:'Playfair Display',serif; font-size:1.12rem; }
  .week-date { font-size:.74rem; color:var(--slate); font-weight:600; margin-top:2px; }
  .week-focus { font-size:.78rem; color:var(--slate); margin-bottom:10px; line-height:1.5; }
  .week-list { list-style:none; padding:0; }
  .week-list li { padding:7px 0 7px 22px; position:relative; font-size:.79rem; line-height:1.45; border-bottom:1px dashed #f1f5f9; }
  .week-list li:last-child { border-bottom:none; }
  .week-list li:before { content:'▸'; position:absolute; left:5px; color:var(--wc); font-weight:800; }
  .week-list li b { color:var(--ink); }

  /* Domain chip */
  .dom-chip { display:inline-block; font-size:.65rem; font-weight:700; padding:2px 8px; border-radius:20px; background:#f1f5f9; color:var(--slate); }

  /* Insight callout */
  .callout { background:linear-gradient(135deg, var(--amber-lt) 0%, #fef9c3 100%); border-left:4px solid var(--amber); padding:14px 18px; border-radius:8px; margin-bottom:18px; font-size:.82rem; line-height:1.5; }
  .callout b { color:var(--amber); }
  .callout.green { background:linear-gradient(135deg, var(--green-lt) 0%, #dcfce7 100%); border-left-color:var(--green); }
  .callout.green b { color:var(--green); }
  .callout.rose { background:linear-gradient(135deg, var(--rose-lt) 0%, #fce7f3 100%); border-left-color:var(--rose); }
  .callout.rose b { color:var(--rose); }

  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:#f1f5f9; }
  ::-webkit-scrollbar-thumb { background:#94a3b8; border-radius:3px; }

  /* Class color legend */
  .leg { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px; font-size:.72rem; }
  .leg-item { display:flex; align-items:center; gap:6px; }
  .leg-sw { width:14px; height:14px; border-radius:3px; }

  /* Empty state */
  .empty { text-align:center; padding:40px 20px; color:var(--slate); font-size:.85rem; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="htitle">
      <h1>8th Grade Science Dashboard</h1>
      <span>Progress Learning Benchmark Data · Florida BEST Standards</span>
    </div>
    <div class="cdown">
      <div>
        <div class="cdown-lbl">Test Countdown</div>
        <div class="cdown-date">May 15, 2026</div>
      </div>
      <div style="display:flex;gap:9px;align-items:flex-end">
        <div style="text-align:center">
          <div class="cdown-num" id="cd-days">--</div>
          <div class="cdown-sub">days</div>
        </div>
        <div style="text-align:center;opacity:.85">
          <div style="font-family:'Playfair Display',serif;font-size:1.5rem;color:#fbbf24;line-height:1" id="cd-hrs">--</div>
          <div class="cdown-sub">hrs</div>
        </div>
        <div style="text-align:center;opacity:.75">
          <div style="font-family:'Playfair Display',serif;font-size:1.5rem;color:#fbbf24;line-height:1" id="cd-min">--</div>
          <div class="cdown-sub">min</div>
        </div>
        <div style="text-align:center;opacity:.6">
          <div style="font-family:'Playfair Display',serif;font-size:1.5rem;color:#fbbf24;line-height:1" id="cd-sec">--</div>
          <div class="cdown-sub">sec</div>
        </div>
      </div>
    </div>
  </div>
  <div class="course-bar">
    <button class="course-btn bio active" id="cBio" onclick="setCourse('bio')">🧬 Biology Honors · EOC</button>
    <button class="course-btn mj" id="cMj" onclick="setCourse('mj')">🔬 M/J Comp Science 3 · 8th SSA</button>
  </div>
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="showTab('overview',this)">📊 Overview</button>
    <button class="tab-btn" onclick="showTab('class',this)">🏫 Class View</button>
    <button class="tab-btn" onclick="showTab('standards',this)">📋 Standards &amp; Gaps</button>
    <button class="tab-btn" onclick="showTab('individual',this)">👤 Individual</button>
    <button class="tab-btn" onclick="showTab('tiers',this)">🎯 Tier Placement</button>
    <button class="tab-btn" onclick="showTab('action',this)">📝 Action Plan</button>
  </nav>
</header>

<main>
<div id="tab-overview" class="tab-pane active"></div>
<div id="tab-class" class="tab-pane"></div>
<div id="tab-standards" class="tab-pane"></div>
<div id="tab-individual" class="tab-pane"></div>
<div id="tab-tiers" class="tab-pane"></div>
<div id="tab-action" class="tab-pane"></div>
</main>

// Mastery thresholds (Tier classification)
function tierOf(score){
  if(score === null || score === undefined) return null;
  if(score >= 70) return 1;
  if(score >= 50) return 2;
  return 3;
}
function tierColor(t){ return ['','#15803d','#d97706','#be123c'][t] || '#64748b'; }
function tierName(t){ return ['','Tier 1: On Track','Tier 2: Approaching','Tier 3: Intensive'][t] || ''; }

function pillForScore(s){
  if(s === null || s === undefined) return '<span class="ptag p-na">—</span>';
  if(s >= 80) return `<span class="ptag p-mas">${s}</span>`;
  if(s >= 65) return `<span class="ptag p-prof">${s}</span>`;
  if(s >= 50) return `<span class="ptag p-app">${s}</span>`;
  if(s >= 35) return `<span class="ptag p-bel">${s}</span>`;
  return `<span class="ptag p-far">${s}</span>`;
}

function diffArrow(d){
  if(d === null || d === undefined) return '<span class="diff-flat">—</span>';
  if(d > 0) return `<span class="diff-up">▲ +${d}</span>`;
  if(d < 0) return `<span class="diff-dn">▼ ${d}</span>`;
  return '<span class="diff-flat">▬ 0</span>';
}

function gapPill(b3){
  if(b3 === null || b3 === undefined) return '<span class="gpill gmd">—</span>';
  if(b3 < 50) return '<span class="gpill ghi">Critical Gap</span>';
  if(b3 < 70) return '<span class="gpill gmd">Moderate Gap</span>';
  return '<span class="gpill glo">On Track</span>';
}

function cdata(){ return DATA[currentCourse]; }
function students(){ return cdata().students; }

// Average across non-null students
function avg(arr, key){
  const v = arr.filter(x => x[key] !== null && x[key] !== undefined).map(x => x[key]);
  if(v.length === 0) return 0;
  return Math.round(v.reduce((a,b)=>a+b,0) / v.length);
}

// COUNTDOWN
// ════════════════════════════════════════
function tickCountdown(){
  const now = new Date();
  const diff = TEST_DATE - now;
  if(diff <= 0){
    document.getElementById('cd-days').textContent = '0';
    document.getElementById('cd-hrs').textContent = '0';
    document.getElementById('cd-min').textContent = '0';
    document.getElementById('cd-sec').textContent = '0';
    return;
  }
  const days = Math.floor(diff / 86400000);
  const hrs = Math.floor((diff % 86400000) / 3600000);
  const min = Math.floor((diff % 3600000) / 60000);
  const sec = Math.floor((diff % 60000) / 1000);
  document.getElementById('cd-days').textContent = days;
  document.getElementById('cd-hrs').textContent = hrs;
  document.getElementById('cd-min').textContent = min;
  document.getElementById('cd-sec').textContent = sec;
}
setInterval(tickCountdown, 1000);
tickCountdown();

                <tr class="clk" onclick="selStudent(${stu.indexOf(s)})">

                  <td>${t ? `<span class="ptag" style="background:${tierColor(t)}22;color:${tierColor(t)}">Tier ${t}</span>` : '<span class="ptag p-na">No B3</span>'}</td>
                  <td style="text-align:right">${s.b1 !== null ? s.b1+'%' : '—'}</td>
                  <td style="text-align:right"><b>${s.b3 !== null ? s.b3+'%' : '—'}</b></td>
                  <td style="text-align:right">${diffArrow(s.diff)}</td>
                  <td>${gapPill(s.b3)}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  if(currentStudent !== null){
    renderStudentDetail(currentStudent);
  }
}

function onSearchInput(v){
  studentSearch = v;
  // Re-render only the table portion to preserve search focus
  const stu = students().sort((a,b) => (a.last||'').localeCompare(b.last||'') || a.name.localeCompare(b.name));
  const filtered = stu.filter(s => {
    const fullName = (s.name + ' ' + (s.last||'')).toLowerCase();
    return fullName.includes(studentSearch.toLowerCase());
  });
  // simplest: just re-render
  renderIndividual();
  document.getElementById('stuSrch').focus();
  document.getElementById('stuSrch').setSelectionRange(v.length, v.length);
}

function selStudent(i){
  currentStudent = i;
  renderStudentDetail(i);
  // Scroll to detail
  document.getElementById('indDetail').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function renderStudentDetail(i){
  const s = students()[i];
  if(!s) return;
  const det = document.getElementById('indDetail');
  det.classList.add('show');

  // Domain rollup for this student
  const domAgg = {};
  s.standards.forEach(st => {
    if(!domAgg[st.domain]) domAgg[st.domain] = {b1:[], b3:[]};
    if(st.b1 !== null) domAgg[st.domain].b1.push(st.b1);
    if(st.b3 !== null) domAgg[st.domain].b3.push(st.b3);
  });
  const domRows = Object.entries(domAgg).map(([d,v]) => ({
    domain:d,
    b1: v.b1.length ? Math.round(v.b1.reduce((a,b)=>a+b,0)/v.b1.length) : 0,
    b3: v.b3.length ? Math.round(v.b3.reduce((a,b)=>a+b,0)/v.b3.length) : 0
  }));

  const t = tierOf(s.b3);

  det.innerHTML = `
    <div class="ind-head">
      <div>
        <div class="ind-name">${s.name} ${s.last||''}</div>
        <div class="ind-meta">${s.course || ''} · ${t ? tierName(t) : 'Tier — not yet assessed on B3'}</div>
      </div>
      <button onclick="closeStudent()" style="background:#f1f5f9;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:700;color:var(--slate)">✕ Close</button>
    </div>

    <div class="ind-scores">
      <div class="ind-score" style="border-color:#0284c7"><div class="ind-score-lbl">B1 Score</div><div class="ind-score-val" style="color:#0284c7">${s.b1 !== null ? s.b1+'%' : '—'}</div></div>
      <div class="ind-score" style="border-color:#15803d"><div class="ind-score-lbl">B3 Score</div><div class="ind-score-val" style="color:#15803d">${s.b3 !== null ? s.b3+'%' : '—'}</div></div>
      <div class="ind-score" style="border-color:${(s.diff||0) >= 0 ? '#15803d' : '#be123c'}"><div class="ind-score-lbl">Growth</div><div class="ind-score-val" style="color:${(s.diff||0) >= 0 ? '#15803d' : '#be123c'}">${s.diff !== null ? (s.diff >= 0 ? '+' : '')+s.diff : '—'}</div></div>
      <div class="ind-score" style="border-color:${t ? tierColor(t) : '#94a3b8'}"><div class="ind-score-lbl">Tier</div><div class="ind-score-val" style="color:${t ? tierColor(t) : '#94a3b8'}">${t || '—'}</div></div>
    </div>

    <div class="two-col">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:11px">Performance by Domain</div>
        <div class="dbar-wrap">
          ${domRows.map(d => `
            <div>
              <div class="dbar-name"><span>${d.domain}</span><span>${d.b1}% → ${d.b3}%</span></div>
              <div class="dbar-bg">
                <div class="dbar-fill" style="width:${d.b3}%;background:${DOM_COLOR[d.domain]||'#6d28d9'}">${d.b3}%</div>
                <div class="dbar-bench" style="left:70%"></div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:11px">Standard-Level Detail</div>
        <div style="max-height:380px;overflow-y:auto">
          <table class="stbl">
            <thead><tr><th>Code</th><th>Standard</th><th style="text-align:right">B1</th><th style="text-align:right">B3</th></tr></thead>
            <tbody>
              ${s.standards.map(st => `
                <tr>
                  <td><span class="scode ${currentCourse==='bio'?'scode-bio':''}" style="font-size:.62rem">${st.code}</span></td>
                  <td style="font-size:.7rem">${st.name}</td>
                  <td style="text-align:right">${st.b1 !== null ? st.b1+'%' : '—'}</td>
                  <td style="text-align:right"><b>${st.b3 !== null ? st.b3+'%' : '—'}</b></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function closeStudent(){
  currentStudent = null;
  document.getElementById('indDetail').classList.remove('show');
}

// TIER PLACEMENT TAB
// ════════════════════════════════════════
function renderTiers(){
  const stu = students();
  const t1 = stu.filter(s => tierOf(s.b3) === 1).sort((a,b) => b.b3 - a.b3);
  const t2 = stu.filter(s => tierOf(s.b3) === 2).sort((a,b) => b.b3 - a.b3);
  const t3 = stu.filter(s => tierOf(s.b3) === 3).sort((a,b) => b.b3 - a.b3);
  const noData = stu.filter(s => s.b3 === null);

  const total = t1.length + t2.length + t3.length;
  const t1Pct = total ? Math.round(t1.length / total * 100) : 0;
  const t2Pct = total ? Math.round(t2.length / total * 100) : 0;
  const t3Pct = total ? Math.round(t3.length / total * 100) : 0;

  document.getElementById('tab-tiers').innerHTML = `
    <h2 class="sec-title">Tiered Support Placement</h2>
    <p class="sec-sub">Students grouped by B3 performance for differentiated instruction · ${total} students with current data${noData.length ? ' · '+noData.length+' missing B3' : ''}</p>

    <div class="callout">
      <b>Tier framework:</b> Tier 1 (≥70%) — on track, enrich and accelerate · Tier 2 (50–69%) — approaching, targeted small-group support · Tier 3 (&lt;50%) — intensive remediation needed before ${TEST_DATE.toLocaleDateString('en-US',{month:'long',day:'numeric'})}.
    </div>

    <div class="tier-grid">
      <div class="tier-card t1">
        <div class="tier-head">
          <div>
            <div class="tier-lbl">Tier 1 · On Track</div>
            <div class="tier-sub">Score ≥ 70% on current benchmark</div>
          </div>
          <div class="tier-count">${t1.length}</div>
        </div>
        <div class="tier-desc">${t1Pct}% of tested students. Continue grade-level instruction with enrichment activities and peer-tutoring opportunities.</div>
        <div class="tier-list">
          ${t1.length ? t1.map(s => `
            <div class="tier-stu"><span class="tier-stu-name">${s.name} ${s.last||''}</span><span class="tier-stu-sc">${s.b3}%</span></div>
          `).join('') : '<div class="empty">No students in this tier</div>'}
        </div>
      </div>

      <div class="tier-card t2">
        <div class="tier-head">
          <div>
            <div class="tier-lbl">Tier 2 · Approaching</div>
            <div class="tier-sub">Score 50% – 69% on current benchmark</div>
          </div>
          <div class="tier-count">${t2.length}</div>
        </div>
        <div class="tier-desc">${t2Pct}% of tested students. Targeted small-group instruction on priority standards (see Standards tab). Twice-weekly Progress Learning practice assignments.</div>
        <div class="tier-list">
          ${t2.length ? t2.map(s => `
            <div class="tier-stu"><span class="tier-stu-name">${s.name} ${s.last||''}</span><span class="tier-stu-sc">${s.b3}%</span></div>
          `).join('') : '<div class="empty">No students in this tier</div>'}
        </div>
      </div>

      <div class="tier-card t3">
        <div class="tier-head">
          <div>
            <div class="tier-lbl">Tier 3 · Intensive</div>
            <div class="tier-sub">Score &lt; 50% on current benchmark</div>
          </div>
          <div class="tier-count">${t3.length}</div>
        </div>
        <div class="tier-desc">${t3Pct}% of tested students. Daily 1:1 or small-group remediation. Pull-out support during enrichment block. Communicate with families about home practice.</div>
        <div class="tier-list">
          ${t3.length ? t3.map(s => `
            <div class="tier-stu"><span class="tier-stu-name">${s.name} ${s.last||''}</span><span class="tier-stu-sc">${s.b3}%</span></div>
          `).join('') : '<div class="empty">No students in this tier</div>'}
        </div>
      </div>
    </div>

    ${noData.length ? `
      <div class="card">
        <div class="card-title"><span class="cicon" style="background:#f1f5f9;color:var(--slate)">?</span>Missing Benchmark Data</div>
        <p style="font-size:.78rem;color:var(--slate);margin-bottom:12px">These students do not have a current B3 score and need to be assessed before tier placement can be confirmed.</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          ${noData.map(s => `<div style="background:#f1f5f9;padding:6px 12px;border-radius:6px;font-size:.78rem">${s.name} ${s.last||''}</div>`).join('')}
        </div>
      </div>
    ` : ''}
  `;
}

// ACTION PLAN TAB

function renderAction(){
  const stu = students();
  const data = cdata();

  // Find priority gap standards
  const stdAgg = {};
  stu.forEach(s => {
    s.standards.forEach(st => {
      const k = st.code;
      if(!stdAgg[k]) stdAgg[k] = {code:st.code, name:st.name, domain:st.domain, b3:[]};
      if(st.b3 !== null) stdAgg[k].b3.push(st.b3);
    });
  });
  const stdRows = Object.values(stdAgg).map(s => ({
    ...s,
    b3Avg: s.b3.length ? Math.round(s.b3.reduce((a,b)=>a+b,0)/s.b3.length) : 0
  })).sort((a,b) => a.b3Avg - b.b3Avg);

  const top5Gaps = stdRows.slice(0, 5);
  const top10to6Gaps = stdRows.slice(5, 10);

  // Compute weeks remaining
  const now = new Date();
  const weeksOut = Math.ceil((TEST_DATE - now) / (1000*60*60*24*7));

  const courseLabel = currentCourse === 'bio' ? 'Biology 1 EOC (5/15/26)' : '8th Grade Statewide Science Assessment (5/15/26)';

  // Build week plan working backwards
  const weeks = [
    {
      num: 'Week 1',
      date: 'Now → ~3 weeks before test',
      color: '#0f766e',
      title: 'Diagnostic Reset & Critical Gap Targeting',
      focus: 'Re-establish where each student stands. Reteach the 5 lowest-performing standards through whole-class direct instruction with worked examples.',
      items: [
        `<b>Whole class:</b> Reteach top critical gaps — ${top5Gaps.slice(0,3).map(s=>s.code).join(', ')}`,
        `<b>Tier 3 students:</b> Pull-out small group on prerequisite skills 2–3× per week`,
        `<b>${PORTAL_NAME} assignments:</b> Push targeted practice sets aligned to ${top5Gaps[0]?.code || 'priority standards'}`,
        `<b>Data check:</b> Quick CFAs (3–4 questions) at end of each lesson; record results for week-over-week tracking`,
        `<b>Family communication:</b> Send home tier-placement letters with at-home Progress Learning practice link for Tier 2/3 families`
      ]
    },
    {
      num: 'Week 2',
      date: '~2 weeks before test',
      color: '#d97706',
      title: 'Mixed Review & Domain Deep Dives',
      focus: 'Consolidate gains. Cycle through all major domains with mixed-format problems mirroring the test blueprint.',
      items: [
        `<b>Daily warm-ups:</b> 5-question domain spirals rotating across ${currentCourse==='bio' ? 'all 6 Biology reporting categories' : 'Nature of Science, Earth/Space, Physical, and Life Science'}`,
        `<b>Tier 2 small group:</b> Focus on standards where students moved from below 50% to 50–69% — push to mastery`,
        `<b>Tier 1 students:</b> Begin EOC/SSA practice tests under timed conditions with metacognitive debrief`,
        `<b>Reteach standards still under 60%:</b> ${top10to6Gaps.slice(0,3).map(s=>s.code).join(', ')}`,
        `<b>${PORTAL_NAME}:</b> Assign one full-length practice with auto-grading; review item-by-item with whole class`
      ]
    },
    {
      num: 'Week 3',
      date: '~1 week before test',
      color: '#6d28d9',
      title: 'Test Strategy & Confidence Building',
      focus: 'Shift from content acquisition to test-taking strategy and stamina. Frame mindset for success.',
      items: [
        `<b>Test format walkthrough:</b> Multi-select, drag-and-drop, technology-enhanced item types — practice each format`,
        `<b>Strategy lessons:</b> Process-of-elimination, reading the question stem first, flagging items, time management (~1 min/item)`,
        `<b>Stamina building:</b> One full-length timed practice mid-week; debrief with item analysis on Friday`,
        `<b>Targeted 1:1 conferencing:</b> Meet briefly with every Tier 3 student to set personal goals and confidence-build`,
        `<b>Family note:</b> Sleep, breakfast, and arrival-time reminders for the week of testing`
      ]
    },
    {
      num: 'Test Week',
      date: 'Week of May 15, 2026',
      color: '#be123c',
      title: 'Final Review & Test Day Execution',
      focus: 'Light review only — confidence and recall, not new learning. Logistics and student emotional support take priority.',
      items: [
        `<b>Mon–Tue:</b> 15-minute "greatest hits" reviews — vocabulary, formulas, key diagrams (cell, food web, rock cycle, etc.)`,
        `<b>Wed (test eve):</b> No new content. Light, low-stakes review games. Verify accommodations and assistive tech for IEP/504 students`,
        `<b>Test day (5/15):</b> Arrive early, calm classroom environment, water and snacks available, encouraging messages on board`,
        `<b>During testing:</b> Active monitoring per FDOE protocol; no coaching but presence and positive nonverbal support`,
        `<b>Post-test:</b> Celebrate effort regardless of perceived performance. Begin reflection journal for next-year planning`
      ]
    }
  ];

  document.getElementById('tab-action').innerHTML = `
    <h2 class="sec-title">Action Plan to Test Day</h2>
    <p class="sec-sub">Week-by-week roadmap toward ${courseLabel} · ~${weeksOut} weeks remaining · Anchored to ${PORTAL_NAME} data</p>

    <div class="callout green">
      <b>Top 5 Priority Standards</b> (lowest current B3 averages — focus reteaching here first):
      <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:8px">
        ${top5Gaps.map(s => `<span style="background:#fff;padding:4px 10px;border-radius:6px;font-size:.74rem"><span class="scode ${currentCourse==='bio'?'scode-bio':''}">${s.code}</span> ${s.name} <b style="color:var(--rose)">${s.b3Avg}%</b></span>`).join('')}
      </div>

    ${weeks.map(w => `
      <div class="week-card" style="--wc:${w.color}">

            <div class="week-title">${w.title}</div>

      <div class="card-title"><span class="cicon" style="background:var(--sky-lt);color:var(--sky)">📌</span>Standing Routines (Now Through Test Day)</div>
      <ul class="week-list" style="--wc:var(--sky)">
        <li><b>Daily:</b> 5-minute spiral warm-up rotating through all domains; exit ticket aligned to that day's standard</li>
        <li><b>Weekly:</b> One ${PORTAL_NAME} assignment (15–20 min) targeting that week's focus standards; review results in class</li>
        <li><b>Weekly:</b> Update tier placement based on quick checks — students can move tiers in either direction</li>
        <li><b>Bi-weekly:</b> Brief teacher-team data review (PLC) to share what's working across sections</li>
        <li><b>Continuous:</b> Highlight student growth publicly (gains, not absolute scores) to build mindset and motivation</li>
      </ul>
    </div>
  `;
}
