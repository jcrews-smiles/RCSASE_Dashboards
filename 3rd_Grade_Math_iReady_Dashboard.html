<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3rd Grade Math iReady Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f172a;
    --ink2: #1e293b;
    --plum: #6d28d9;
    --plum-lt: #ede9fe;
    --amber: #d97706;
    --amber-lt: #fef3c7;
    --rose: #be123c;
    --rose-lt: #ffe4e6;
    --teal: #0f766e;
    --teal-lt: #ccfbf1;
    --sky: #0284c7;
    --sky-lt: #e0f2fe;
    --green: #15803d;
    --green-lt: #dcfce7;
    --slate: #64748b;
    --paper: #faf9f7;
    --white: #ffffff;
    --card-shadow: 0 2px 16px rgba(15,23,42,0.10);
    --t1: #15803d; --t2: #d97706; --t3: #be123c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Source Sans 3',sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; }

  /* HEADER */
  header { background:var(--ink); color:#fff; position:sticky; top:0; z-index:100; box-shadow:0 3px 20px rgba(0,0,0,.4); }
  .header-inner { display:flex; align-items:center; justify-content:space-between; padding:12px 32px; gap:20px; flex-wrap:wrap; }
  .htitle h1 { font-family:'Playfair Display',serif; font-size:1.4rem; letter-spacing:.2px; }
  .htitle span { font-size:.72rem; color:#a78bfa; font-weight:600; letter-spacing:.9px; text-transform:uppercase; display:block; margin-top:2px; }
  .test-badge { display:flex; align-items:center; gap:14px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:10px 18px; }
  .test-lbl { font-size:.68rem; text-transform:uppercase; letter-spacing:1px; color:#a78bfa; font-weight:700; }
  .test-name { font-family:'Playfair Display',serif; font-size:1.05rem; color:#fbbf24; line-height:1.15; }
  .test-date { font-size:.73rem; color:#fde68a; font-weight:600; margin-top:2px; }

  /* COUNTDOWN */
  .countdown { display:flex; align-items:center; gap:10px; background:linear-gradient(135deg,#be123c,#7c3aed); border-radius:10px; padding:10px 16px; border:1px solid rgba(255,255,255,.2); }
  .cd-icon { font-size:1.6rem; }
  .cd-body { display:flex; flex-direction:column; }
  .cd-lbl { font-size:.62rem; text-transform:uppercase; letter-spacing:1px; color:#fde68a; font-weight:800; }
  .cd-grid { display:flex; gap:8px; margin-top:3px; }
  .cd-unit { display:flex; flex-direction:column; align-items:center; min-width:34px; }
  .cd-val { font-family:'Playfair Display',serif; font-size:1.25rem; color:#fff; font-weight:700; line-height:1; }
  .cd-lbl-small { font-size:.55rem; color:#e9d5ff; text-transform:uppercase; letter-spacing:.5px; font-weight:700; margin-top:2px; }

  .tab-nav { display:flex; background:var(--ink2); padding:0 32px; border-bottom:2px solid rgba(255,255,255,.06); overflow-x:auto; }
  .tab-btn { background:none; border:none; color:#94a3b8; padding:10px 20px; font-family:'Source Sans 3',sans-serif; font-size:.8rem; font-weight:700; cursor:pointer; border-bottom:3px solid transparent; transition:all .2s; white-space:nowrap; letter-spacing:.5px; text-transform:uppercase; }
  .tab-btn:hover { color:#fff; }
  .tab-btn.active { color:#c4b5fd; border-bottom-color:#7c3aed; }

  /* MAIN */
  main { padding:26px 32px; max-width:1600px; margin:0 auto; }
  .tab-pane { display:none; animation:fadeUp .3s ease; }
  .tab-pane.active { display:block; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .sec-title { font-family:'Playfair Display',serif; font-size:1.45rem; margin-bottom:5px; }
  .sec-sub { font-size:.82rem; color:var(--slate); margin-bottom:22px; }

  /* STAT CARDS */
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:26px; }
  .stat-card { background:#fff; border-radius:12px; padding:16px 18px; box-shadow:var(--card-shadow); border-top:4px solid var(--acc,#7c3aed); }
  .stat-lbl { font-size:.68rem; text-transform:uppercase; letter-spacing:.8px; color:var(--slate); font-weight:700; margin-bottom:7px; }
  .stat-val { font-family:'Playfair Display',serif; font-size:1.9rem; line-height:1; color:var(--acc,#7c3aed); margin-bottom:3px; }
  .stat-det { font-size:.72rem; color:var(--slate); }

  /* LAYOUTS */
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px; }
  .three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; margin-bottom:18px; }
  @media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr}}

  /* CARD */
  .card { background:#fff; border-radius:14px; padding:20px 22px; box-shadow:var(--card-shadow); }
  .card-title { font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:14px; display:flex; align-items:center; gap:9px; }
  .cicon { width:26px; height:26px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:.8rem; flex-shrink:0; }

  /* BARS */
  .pbar-wrap { margin-bottom:9px; }
  .pbar-top { font-size:.73rem; font-weight:700; display:flex; justify-content:space-between; margin-bottom:3px; }
  .pbar-bg { background:#e2e8f0; border-radius:5px; height:9px; overflow:hidden; }
  .pbar-fill { height:100%; border-radius:5px; transition:width .8s ease; }
  .dbar-wrap { display:flex; flex-direction:column; gap:9px; }
  .dbar-name { font-size:.72rem; font-weight:700; color:var(--slate); margin-bottom:2px; display:flex; justify-content:space-between; }
  .dbar-bg { position:relative; background:#e2e8f0; border-radius:5px; height:18px; overflow:hidden; }
  .dbar-fill { height:100%; border-radius:5px; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; font-size:.65rem; color:#fff; font-weight:800; transition:width .8s ease; }
  .dbar-bench { position:absolute; top:0; height:100%; width:2px; background:#1e293b; }

  /* FAST INFO CALLOUT */
  .fast-cal { background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%); border-radius:12px; padding:14px 18px; margin-bottom:18px; border-left:5px solid #d97706; display:flex; gap:12px; align-items:flex-start; }
  .fast-cal-icon { font-size:1.5rem; flex-shrink:0; }
  .fast-cal-title { font-weight:800; font-size:.82rem; color:#78350f; margin-bottom:3px; }
  .fast-cal-txt { font-size:.72rem; color:#78350f; line-height:1.5; }

  /* CLASS CARD */
  .class-card { background:#fff; border-radius:12px; padding:16px 18px; box-shadow:var(--card-shadow); border-left:5px solid var(--acc); margin-bottom:14px; }
  .cc-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:10px; }
  .cc-name { font-family:'Playfair Display',serif; font-size:1.15rem; }
  .cc-teacher { font-size:.72rem; color:var(--slate); margin-top:2px; }
  .cc-count { padding:4px 11px; border-radius:16px; background:var(--acc); color:#fff; font-size:.68rem; font-weight:800; }
  .cc-metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:12px; margin-bottom:10px; }
  .ccm { text-align:center; background:#f8fafc; border-radius:8px; padding:9px 6px; }
  .ccm-val { font-family:'Playfair Display',serif; font-size:1.25rem; color:var(--acc); line-height:1; }
  .ccm-lbl { font-size:.6rem; text-transform:uppercase; letter-spacing:.6px; color:var(--slate); font-weight:700; margin-top:3px; }

  /* TABLE */
  table { width:100%; border-collapse:collapse; font-size:.73rem; }
  th { background:#f1f5f9; padding:9px 10px; text-align:left; font-weight:800; color:var(--slate); text-transform:uppercase; font-size:.64rem; letter-spacing:.6px; border-bottom:2px solid #cbd5e1; }
  td { padding:8px 10px; border-bottom:1px solid #e2e8f0; }
  tr:hover { background:#f8fafc; }
  .place-chip { display:inline-block; padding:2px 8px; border-radius:11px; font-size:.63rem; font-weight:800; color:#fff; }

  /* TIERS */
  .tier-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:22px; }
  @media(max-width:880px){.tier-grid{grid-template-columns:1fr}}
  .tcard { border-radius:13px; padding:18px 20px; box-shadow:var(--card-shadow); border-top:5px solid; }
  .tcard.t1 { background:#f0fdf4; border-color:var(--green); }
  .tcard.t2 { background:#fffbeb; border-color:var(--amber); }
  .tcard.t3 { background:#fff1f2; border-color:var(--rose); }
  .t-hd { display:flex; align-items:center; gap:9px; margin-bottom:12px; }
  .t-num { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:.95rem; color:#fff; flex-shrink:0; }
  .tcard.t1 .t-num { background:var(--green); }
  .tcard.t2 .t-num { background:var(--amber); }
  .tcard.t3 .t-num { background:var(--rose); }
  .t-title { font-family:'Playfair Display',serif; font-size:1.05rem; line-height:1.15; }
  .t-count { font-size:.68rem; color:var(--slate); margin-top:2px; }
  .t-sec { margin-bottom:13px; }
  .t-sec-title { font-size:.68rem; text-transform:uppercase; letter-spacing:.7px; font-weight:800; color:var(--slate); margin-bottom:7px; }
  .t-list { list-style:none; padding-left:0; }
  .t-list li { font-size:.72rem; line-height:1.45; padding:4px 0 4px 16px; position:relative; color:var(--ink); }
  .t-list li:before { content:"▸"; position:absolute; left:0; color:var(--slate); font-weight:800; }

  /* INDIVIDUAL */
  .stu-search { width:100%; padding:11px 15px; font-size:.85rem; border:2px solid #e2e8f0; border-radius:9px; font-family:'Source Sans 3',sans-serif; margin-bottom:12px; }
  .stu-search:focus { outline:none; border-color:var(--plum); }
  .filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .fbtn { padding:6px 14px; font-size:.7rem; font-weight:700; border:2px solid #e2e8f0; background:#fff; border-radius:18px; cursor:pointer; color:var(--slate); text-transform:uppercase; letter-spacing:.5px; transition:all .15s; }
  .fbtn:hover { border-color:#cbd5e1; }
  .fbtn.active { background:var(--plum); color:#fff; border-color:var(--plum); }

  .stu-card { background:#fff; border-radius:14px; padding:22px 26px; box-shadow:var(--card-shadow); margin-bottom:18px; border-left:6px solid var(--acc); }
  .stu-hd { display:flex; align-items:center; gap:15px; margin-bottom:18px; flex-wrap:wrap; }
  .stu-avatar { width:55px; height:55px; border-radius:50%; background:var(--acc); display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:1.5rem; color:#fff; flex-shrink:0; }
  .stu-name { font-family:'Playfair Display',serif; font-size:1.4rem; }
  .stu-meta { font-size:.78rem; color:var(--slate); margin-top:3px; }
  .stu-chips { display:flex; gap:7px; flex-wrap:wrap; margin-top:7px; }
  .pchip { padding:3px 11px; border-radius:20px; font-size:.7rem; font-weight:700; }
  .pmet-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-bottom:18px; }
  .pmet { background:#f8f9fa; border-radius:9px; padding:12px; text-align:center; }
  .pm-lbl { font-size:.63rem; text-transform:uppercase; letter-spacing:.7px; color:var(--slate); font-weight:700; margin-bottom:5px; }
  .pm-val { font-family:'Playfair Display',serif; font-size:1.5rem; line-height:1; }
  .pm-sub { font-size:.65rem; color:var(--slate); margin-top:2px; }
  .dom-grid { display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-bottom:18px; }
  @media(max-width:680px){.dom-grid{grid-template-columns:1fr}}
  .dcard { background:#f8f9fa; border-radius:9px; padding:12px 14px; border-left:4px solid; }
  .dc-title { font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:var(--slate); margin-bottom:5px; }
  .dc-place { font-weight:700; font-size:.85rem; margin-bottom:3px; }
  .dc-score { font-size:.72rem; color:var(--slate); }
  .std-match-item { font-size:.68rem; padding:3px 0; border-top:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; gap:6px; }
  .gbr-row { display:flex; align-items:center; gap:11px; margin-bottom:9px; }
  .gbr-lbl { font-size:.7rem; font-weight:700; width:140px; flex-shrink:0; color:var(--slate); }
  .gbr-bg { flex:1; background:#e2e8f0; border-radius:5px; height:16px; position:relative; overflow:hidden; }
  .gbr-fill { height:100%; border-radius:5px; display:flex; align-items:center; justify-content:flex-end; padding-right:5px; font-size:.6rem; color:#fff; font-weight:800; }

  /* ACTION PLAN */
  .ap-phase { background:#fff; border-radius:13px; padding:20px 22px; box-shadow:var(--card-shadow); margin-bottom:18px; border-left:6px solid var(--acc); }
  .ap-hd { display:flex; align-items:center; gap:13px; margin-bottom:13px; flex-wrap:wrap; }
  .ap-num { width:44px; height:44px; border-radius:50%; background:var(--acc); color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:1.2rem; flex-shrink:0; }
  .ap-title { font-family:'Playfair Display',serif; font-size:1.2rem; }
  .ap-dates { font-size:.72rem; color:var(--slate); margin-top:2px; }
  .ap-countdown { margin-left:auto; padding:4px 12px; border-radius:16px; background:#fef3c7; color:#92400e; font-size:.7rem; font-weight:800; }
  .ap-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:880px){.ap-grid{grid-template-columns:1fr}}
  .ap-box { background:#f8fafc; border-radius:9px; padding:13px 15px; }
  .ap-box-title { font-size:.72rem; text-transform:uppercase; letter-spacing:.7px; font-weight:800; color:var(--slate); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
  .ap-list { list-style:none; padding-left:0; }
  .ap-list li { font-size:.74rem; line-height:1.5; padding:4px 0 4px 17px; position:relative; }
  .ap-list li:before { content:"✓"; position:absolute; left:0; color:var(--green); font-weight:800; }

  /* STANDARDS */
  .std-card { background:#fff; border-radius:12px; padding:16px 18px; box-shadow:var(--card-shadow); margin-bottom:12px; border-left:5px solid var(--acc); }
  .std-hd { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:7px; flex-wrap:wrap; }
  .std-code { font-family:'Playfair Display',serif; font-size:.95rem; color:var(--acc); font-weight:700; }
  .std-dom { font-size:.66rem; text-transform:uppercase; letter-spacing:.8px; color:var(--slate); font-weight:800; margin-top:2px; }
  .std-pri { padding:3px 10px; border-radius:12px; font-size:.62rem; font-weight:800; text-transform:uppercase; color:#fff; letter-spacing:.5px; }
  .std-desc { font-size:.78rem; color:var(--ink); line-height:1.45; margin-bottom:7px; }
  .std-ir { font-size:.7rem; color:var(--slate); padding:6px 10px; background:#f1f5f9; border-radius:7px; margin-bottom:7px; }
  .std-note { font-size:.7rem; color:var(--ink); line-height:1.4; padding:6px 10px; background:#fef3c7; border-radius:7px; border-left:3px solid #d97706; }

  /* FAST BADGES */
  .fast-badges { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
  .fastbadge { padding:6px 14px; border-radius:18px; font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; }

  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:#f1f5f9; }
  ::-webkit-scrollbar-thumb { background:#94a3b8; border-radius:3px; }

  @media print {
    header { position:static; }
    .tab-btn { display:none; }
    .tab-pane { display:block !important; page-break-after:always; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="htitle">
      <h1>3rd Grade Math iReady Dashboard</h1>
      <span>YTD Diagnostic Analysis &middot; Florida B.E.S.T. Standards Alignment</span>
    </div>
    <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
      <div class="test-badge">
        <div style="font-size:1.8rem">&#128221;</div>
        <div>
          <div class="test-lbl">Upcoming Assessment</div>
          <div class="test-name">FAST Math PM3</div>
          <div class="test-date">May 11, 2026</div>
        </div>
      </div>
      <div class="countdown">
        <div class="cd-icon">&#9203;</div>
        <div class="cd-body">
          <div class="cd-lbl">Time to Test</div>
          <div class="cd-grid" id="cd-grid">
            <div class="cd-unit"><div class="cd-val" id="cd-days">--</div><div class="cd-lbl-small">Days</div></div>
            <div class="cd-unit"><div class="cd-val" id="cd-hours">--</div><div class="cd-lbl-small">Hrs</div></div>
            <div class="cd-unit"><div class="cd-val" id="cd-mins">--</div><div class="cd-lbl-small">Min</div></div>
            <div class="cd-unit"><div class="cd-val" id="cd-secs">--</div><div class="cd-lbl-small">Sec</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="showTab('overview',this)">&#128200; Overview</button>
    <button class="tab-btn" onclick="showTab('class',this)">&#127979; Class View</button>
    <button class="tab-btn" onclick="showTab('standards',this)">&#128203; Standards &amp; Gaps</button>
    <button class="tab-btn" onclick="showTab('individual',this)">&#128100; Individual</button>
    <button class="tab-btn" onclick="showTab('tiers',this)">&#127919; Tier Placement</button>
    <button class="tab-btn" onclick="showTab('action',this)">&#128221; Action Plan</button>
  </nav>
</header>

<main>
<div id="tab-overview" class="tab-pane active"></div>
<div id="tab-class" class="tab-pane"></div>
<div id="tab-standards" class="tab-pane"></div>
<div id="tab-individual" class="tab-pane"></div>
<div id="tab-tiers" class="tab-pane"></div>
<div id="tab-action" class="tab-pane"></div>
</main>

function showTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'overview') renderOverview();
  if (name === 'class') renderClass();
  if (name === 'standards') renderStandards();
  if (name === 'individual') renderIndividual();
  if (name === 'tiers') renderTiers();
  if (name === 'action') renderAction();
}

};
const placementRank = {'Grade 1':1,'Grade 2':2,'Early 3':3,'Mid 3':4,'Late 3':5,'Grade 4':6,'Grade 5':7,'Grade 6':8};
const pct = (n,t) => t > 0 ? Math.round(100*n/t) : 0;
const getInits = (name) => {
  const parts = name.split(' ');
  return (parts[0][0] + (parts[1]||'')[0]||'').toUpperCase();
};
const hColor = (name) => {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  const hue = Math.abs(h) % 360;
  return `hsl(${hue}, 55%, 45%)`;
};
const pChip = (p) => `<span class="place-chip" style="background:${placementColors[p]||'#64748b'}">${p}</span>`;
const pBar = (label, pct, color) => `
  <div class="pbar-wrap">

  </div>`;

  'Fortun': '#0284c7',

};
// Normalize homeroom value (handles null/undefined/NaN)
const hrOf = (s) => (s.hr && s.hr !== 'nan' && typeof s.hr === 'string') ? s.hr : 'Unassigned';

// Proficiency determination for FAST Math PM3
// "On track for proficiency" = Mid 3 or above AND/OR strong growth
const isOnTrack = (s) => placementRank[s.p] >= 4;
const isAtRisk = (s) => placementRank[s.p] === 3;  // Early 3 borderline
const isBelow = (s) => placementRank[s.p] <= 2;    // Grade 1 or Grade 2

function updateCountdown() {

  if (diff <= 0) {
    document.getElementById('cd-days').textContent = '0';
    document.getElementById('cd-hours').textContent = '0';
    document.getElementById('cd-mins').textContent = '0';
    document.getElementById('cd-secs').textContent = '0';
    return;
  }
  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff%(1000*60*60))/(1000*60));
  const s = Math.floor((diff%(1000*60))/1000);
  document.getElementById('cd-days').textContent = d;
  document.getElementById('cd-hours').textContent = h;
  document.getElementById('cd-mins').textContent = m;
  document.getElementById('cd-secs').textContent = s;
}

let currentFilter = 'all';

function renderIndividual() {
  const el = document.getElementById('tab-individual');
  
  el.innerHTML = `<div class="sec-title">Individual Student Profiles</div>
  <div class="sec-sub">Search, filter, and drill into each student's domain performance and FL B.E.S.T. standard alignment</div>

  <div class="filter-bar">
    <button class="fbtn active" onclick="setFilter('all',this)">All Students (${S.length})</button>
    <button class="fbtn" onclick="setFilter('t1',this)">🟢 Tier 1 On Grade Level</button>
    <button class="fbtn" onclick="setFilter('t2',this)">🟡 Tier 2 Early 3</button>
    <button class="fbtn" onclick="setFilter('t3',this)">🔴 Tier 3 Below Grade Level</button>
    <button class="fbtn" onclick="setFilter('nogrowth',this)">⚠️ Zero/Low Growth</button>
    <button class="fbtn" onclick="setFilter('accel',this)">⭐ ACCEL</button>
  </div>
  <div id="stu-list"></div>`;
  renderStudentList();
}

function handleSearch(v) {
  currentSearch = v.toLowerCase();
  renderStudentList();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderStudentList();
}

function renderStudentList() {
  let list = [...S];
  if (currentFilter === 't1') list = list.filter(isOnTrack);
  if (currentFilter === 't2') list = list.filter(isAtRisk);
  if (currentFilter === 't3') list = list.filter(isBelow);
  if (currentFilter === 'nogrowth') list = list.filter(s => s.gn < 10);
  if (currentFilter === 'accel') list = list.filter(s => s.ct === 'ACCEL');
  if (currentSearch) list = list.filter(s => s.n.toLowerCase().includes(currentSearch));
  list.sort((a,b) => a.n.localeCompare(b.n));
  
  const holder = document.getElementById('stu-list');
  if (list.length === 0) {
    holder.innerHTML = '<div style="padding:30px;text-align:center;color:#64748b">No students match your filter.</div>';
    return;
  }
  holder.innerHTML = list.map(s => renderStudentCard(s)).join('');
}

function renderStudentCard(s) {
  const tier = isOnTrack(s) ? 1 : (isAtRisk(s) ? 2 : 3);
  const tierColor = tier === 1 ? '#15803d' : tier === 2 ? '#d97706' : '#be123c';
  const tierLabel = tier === 1 ? 'Tier 1 — On Grade Level' : tier === 2 ? 'Tier 2 — Early 3 Watch' : 'Tier 3 — Below Grade Level';
  
  const domains = [
    {n:'Number & Operations', key:'NO', place:s.np, ss:s.nss, rel:s.nr, std:'MA.3.NSO.1–2, MA.3.FR.1–2'},
    {n:'Algebra & Algebraic Thinking', key:'AR', place:s.ap, ss:s.ass, rel:s.ar, std:'MA.3.AR.1–3'},
    {n:'Measurement & Data', key:'MD', place:s.mp, ss:s.mss, rel:s.mr, std:'MA.3.M.1–2, MA.3.DP.1'},
    {n:'Geometry', key:'GEO', place:s.gp, ss:s.gss, rel:s.gr, std:'MA.3.GR.1–2'}
  ];
  
  const needsMidGL = s.mgl - s.ss;
  const gainProj = needsMidGL > 0 ? `Needs +${needsMidGL} pts to reach Mid On Grade Level` : 'At or above Mid On Grade Level benchmark ✓';

  return `<div class="stu-card" style="--acc:${tierColor}">
    <div class="stu-hd">
      <div class="stu-avatar" style="background:${hColor(s.n)}">${getInits(s.n)}</div>
      <div>
        <div class="stu-name">${s.n}</div>
        <div class="stu-meta">Homeroom: ${s.hr} · Teacher: ${s.tch} · ${s.ct === 'ACCEL' ? '⭐ ACCEL' : 'General'}</div>
        <div class="stu-chips">
          <span class="pchip" style="background:${tierColor};color:#fff">${tierLabel}</span>
          <span class="pchip" style="background:${placementColors[s.p]};color:#fff">Overall: ${s.p}</span>
          <span class="pchip" style="background:#e2e8f0;color:#334155">Grouping ${s.grp} / 5</span>
          ${s.rush === 'Y' ? '<span class="pchip" style="background:#be123c;color:#fff">⚡ Rush Flag</span>' : ''}
          ${s.ra === 'On' ? '<span class="pchip" style="background:#0284c7;color:#fff">🔊 Read Aloud</span>' : ''}
        </div>
      </div>
    </div>
    
    <div class="pmet-grid">
      <div class="pmet"><div class="pm-lbl">Scale Score</div><div class="pm-val" style="color:${tierColor}">${s.ss}</div><div class="pm-sub">Baseline: ${s.bss}</div></div>
      <div class="pmet"><div class="pm-lbl">Diagnostic Gain</div><div class="pm-val" style="color:${s.gn >= 25 ? '#15803d' : s.gn >= 10 ? '#d97706' : '#be123c'}">+${s.gn}</div><div class="pm-sub">points YTD</div></div>
      <div class="pmet"><div class="pm-lbl">Percentile</div><div class="pm-val" style="color:${tierColor}">${s.pct}</div><div class="pm-sub">national norm</div></div>
      <div class="pmet"><div class="pm-lbl">Quantile</div><div class="pm-val" style="color:${tierColor};font-size:1.2rem">${s.qnt || '—'}</div><div class="pm-sub">math measure</div></div>
      <div class="pmet"><div class="pm-lbl">Test Duration</div><div class="pm-val" style="color:${tierColor};font-size:1.2rem">${s.dur||'—'} min</div><div class="pm-sub">${s.rush === 'Y' ? '⚠ Possibly rushed' : 'No rush flag'}</div></div>
    </div>

    <div style="margin-bottom:14px">
      <div class="gbr-row">
        <div class="gbr-lbl">Progress to Typical</div>
        <div class="gbr-bg"><div class="gbr-fill" style="width:${Math.min(100, s.pt)}%; background:${s.pt >= 100 ? '#15803d' : s.pt >= 60 ? '#0f766e' : s.pt >= 30 ? '#d97706' : '#be123c'}">${s.pt}%</div></div>
      </div>
      <div class="gbr-row">
        <div class="gbr-lbl">Progress to Stretch</div>
        <div class="gbr-bg"><div class="gbr-fill" style="width:${Math.min(100, s.ps)}%; background:${s.ps >= 100 ? '#6d28d9' : s.ps >= 60 ? '#0f766e' : s.ps >= 30 ? '#d97706' : '#be123c'}">${s.ps}%</div></div>
      </div>
    </div>

    <div class="dom-grid">
      ${domains.map(d => {
        const c = (d.rel === 'Mid or Above Grade Level') ? '#15803d' : (d.rel === 'Early On Grade Level') ? '#d97706' : '#be123c';
        return `<div class="dcard" style="border-color:${c}">
          <div class="dc-title">${d.n}</div>
          <div class="dc-place">${d.place || '—'}</div>

    </div>
  </div>`;
}

function getIndividualRecommendation(s) {
  const tier = isOnTrack(s) ? 1 : (isAtRisk(s) ? 2 : 3);
  const weakest = [
    {k:'nr', n:'Number & Operations', std:'MA.3.NSO', p:s.np, r:s.nr},
    {k:'ar', n:'Algebra', std:'MA.3.AR', p:s.ap, r:s.ar},
    {k:'mr', n:'Measurement/Data', std:'MA.3.M / MA.3.DP', p:s.mp, r:s.mr},
    {k:'gr', n:'Geometry', std:'MA.3.GR', p:s.gp, r:s.gr}
  ].sort((a,b) => (placementRank[a.p]||0) - (placementRank[b.p]||0))[0];

  if (tier === 1) {
    if (s.gn < 15) return `Strong placement but low growth (+${s.gn} pts). Verify engagement — may be under-testing. Push stretch growth via enrichment lessons in ${weakest.n} (${weakest.std}).`;
    if (s.ct === 'ACCEL') return `ACCEL pace confirmed. Enrich with 4th-grade preview in ${weakest.n} (${weakest.std}) and multi-step word problems. Ensure fractions review — blind spot for iReady.`;
    return `On track for FAST Level 3–5. Weakest strand: ${weakest.n} (${weakest.std}) at "${weakest.p}". Target 1–2 focused lessons + fraction review before 5/11.`;
  }
  if (tier === 2) {
    return `Borderline — weakest strand is ${weakest.n} (${weakest.std}) at "${weakest.p}". Place in small-group Tier 2 targeted instruction 3x/week. Close gap = likely Level 3 on FAST.`;
  }
  return `CRITICAL INTERVENTION. Weakest strand: ${weakest.n} (${weakest.std}) at "${weakest.p}". Daily small-group Tier 3 plus iReady assigned lessons (45+ min/week). Fact fluency + fraction basics are non-negotiable.`;
}
